UI_HelpText=Bu araç Windows önyükleme kayıtlarını yedeklemek, geri yüklemek, onarmak ve sürücülerinizi (Driver) yönetmek için tasarlanmıştır.\n\nNasıl çalışır:\n1. Yedekle: Bir bölüm seçin ve onu .wim dosyası olarak kaydedin.\n2. Geri Yükle: Bir .wim dosyası seçin (Install.wim vb.), hedef diski/bölümü seçin.\n3. Boot Onarımı: Sisteminiz açılmıyorsa otomatik taramayı ve onarımı kullanın.\n4. Sürücü Yönetimi: Mevcut sürücülerinizi yedekleyin veya bir klasörden sürücüleri otomatik yükleyin.

