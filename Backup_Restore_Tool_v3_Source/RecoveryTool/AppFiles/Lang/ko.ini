UI_HelpText=이 도구는 Windows 부팅 레코드를 백업, 복원 및 복구하고 드라이버를 관리하기 위해 설계되었습니다.\n\n작동 방식:\n1. 백업: 파티션을 선택하고 .wim 파일로 저장합니다.\n2. 복원: .wim 파일 (Install.wim 등)을 선택하고 대상 디스크/파티션을 지정합니다.\n3. 부팅 복구: 시스템이 부팅되지 않을 경우 자동 검사 및 복구 기능을 사용합니다.\n4. 드라이버 관리: 기존 드라이버를 백업하거나 폴더에서 드라이버를 자동으로 설치합니다.

