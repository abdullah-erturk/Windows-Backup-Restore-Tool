UI_HelpText=Ez az eszköz a Windows indítórekordok biztonsági mentésére, helyreállítására és javítására, valamint az illesztőprogramok kezelésére szolgál.\n\nHogyan működik:\n1. Backup: Válasszon egy partíciót, és mentse .wim fájlként.\n2. Visszaállítás: Válasszon ki egy .wim fájlt (Install.wim stb.), válassza ki a céllemezt/partíciót.\n3. Boot javítás: Ha a rendszer nem indul el, használja az automatikus keresést és javítást.\n4. Illesztőprogram-kezelés: Készítsen biztonsági másolatot a meglévő illesztőprogramokról, vagy automatikusan telepítsen illesztőprogramokat egy mappából.

