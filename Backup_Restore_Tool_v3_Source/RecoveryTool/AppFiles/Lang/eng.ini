UI_HelpText=This tool is designed for backing up, restoring, and repairing Windows boot records and Managing your Drivers.\n\nHow it works:\n1. Backup: Select a partition and save it as a .wim file.\n2. Restore: Select a .wim file (Install.wim, etc.), choose target disk/partition.\n3. Boot Repair: If your system doesn't boot, use auto scan and repair.\n4. Driver Management: Backup your existing drivers or automatically install drivers from a folder.

