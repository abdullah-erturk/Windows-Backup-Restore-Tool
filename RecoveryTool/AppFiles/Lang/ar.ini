UI_HelpText=تم تصميم هذه الأداة للنسخ الاحتياطي واستعادة وإصلاح سجلات تمهيد Windows وإدارة التعريفات.\n\nكيف تعمل:\n1. النسخ الاحتياطي: اختر قسماً واحفظه كملف .wim.\n2. الاستعادة: اختر ملف .wim، واختر القرص/القسم الهدف.\n3. إصلاح التمهيد: استخدم الفحص والإصلاح التلقائيين.\n4. إدارة التعريفات: انسخ احتياطياً أو ثبّت التعريفات من مجلد.

