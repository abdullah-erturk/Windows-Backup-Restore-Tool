UI_HelpText=Esta ferramenta foi projetada para fazer backup, restaurar e reparar registros de inicialização do Windows e gerenciar drivers.\n\nComo funciona:\n1. Backup: Selecionar uma partição e salvá-la como arquivo .wim.\n2. Restaurar: Selecionar um arquivo .wim, escolher disco/partição de destino.\n3. Reparo de inicialização: Usar verificação e reparo automáticos.\n4. Gerenciamento de drivers: Fazer backup ou instalar drivers de uma pasta.

