UI_HelpText=To narzędzie służy do tworzenia kopii zapasowych, przywracania i naprawy rekordów rozruchowych systemu Windows oraz zarządzania sterownikami.\n\nJak działa:\n1. Kopia zapasowa: Wybierz partycję i zapisz ją jako plik .wim.\n2. Przywróć: Wybierz plik .wim, wybierz docelowy dysk/partycję.\n3. Naprawa rozruchu: Użyj automatycznego skanowania i naprawy.\n4. Zarządzanie sterownikami: Utwórz kopię zapasową lub zainstaluj sterowniki z folderu.

