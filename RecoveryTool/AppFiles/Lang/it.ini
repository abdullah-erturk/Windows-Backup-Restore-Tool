UI_HelpText=Questo strumento è progettato per eseguire backup, ripristinare e riparare i record di avvio di Windows e gestire i driver.\n\nCome funziona:\n1. Backup: Seleziona una partizione e salvala come file .wim.\n2. Ripristina: Seleziona un file .wim, scegli disco/partizione di destinazione.\n3. Riparazione avvio: Usa scansione e riparazione automatiche.\n4. Gestione driver: Esegui backup o installa driver da una cartella.

