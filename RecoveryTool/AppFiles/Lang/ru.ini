UI_HelpText=Этот инструмент предназначен для резервного копирования, восстановления и ремонта загрузочных записей Windows, а также управления драйверами.\n\nКак работает:\n1. Резервное копирование: Выберите раздел и сохраните его как файл .wim.\n2. Восстановление: Выберите файл .wim, выберите целевой диск/раздел.\n3. Восстановление загрузки: Используйте автоматическое сканирование и восстановление.\n4. Управление драйверами: Создайте резервную копию или установите драйверы из папки.

