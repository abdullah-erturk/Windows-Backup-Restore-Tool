UI_HelpText=Esta herramienta está diseñada para hacer copias de seguridad, restaurar y reparar registros de arranque de Windows y gestionar controladores.\n\nCómo funciona:\n1. Copia de seguridad: Seleccionar una partición y guardarla como archivo .wim.\n2. Restaurar: Seleccionar un archivo .wim, elegir disco/partición de destino.\n3. Reparación de arranque: Usar análisis y reparación automáticos.\n4. Gestión de controladores: Hacer copia de seguridad o instalar controladores desde una carpeta.

