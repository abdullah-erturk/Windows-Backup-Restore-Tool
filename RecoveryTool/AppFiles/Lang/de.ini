UI_HelpText=Dieses Tool dient zur Sicherung, Wiederherstellung und Reparatur von Windows-Booteinträgen sowie zur Verwaltung von Treibern.\n\nFunktionsweise:\n1. Sichern: Partition auswählen und als .wim-Datei speichern.\n2. Wiederherstellen: .wim-Datei auswählen, Zieldatenträger/Partition wählen.\n3. Startreparatur: Automatischen Scan und Reparatur verwenden.\n4. Treiberverwaltung: Treiber sichern oder aus einem Ordner installieren.

