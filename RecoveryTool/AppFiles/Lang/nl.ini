UI_HelpText=Dit hulpprogramma is ontworpen voor het maken van back-ups, herstellen en repareren van Windows-opstartrecords en het beheren van stuurprogramma's.\n\nHoe het werkt:\n1. Back-up: Selecteer een partitie en sla deze op als .wim-bestand.\n2. Herstellen: Selecteer een .wim-bestand, kies doelschijf/-partitie.\n3. Opstartreparatie: Gebruik automatisch scannen en repareren.\n4. Stuurprogrammabeheer: Maak een back-up of installeer stuurprogramma's vanuit een map.

