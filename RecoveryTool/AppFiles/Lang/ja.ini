UI_HelpText=このツールは Windows ブートレコードのバックアップ、復元、修復、およびドライバーの管理のために設計されています。\n\n使い方:\n1. バックアップ: パーティションを選択して .wim ファイルとして保存。\n2. 復元: .wim ファイルを選択し、ターゲットディスク/パーティションを選択。\n3. ブート修復: 自動スキャンと修復を使用。\n4. ドライバー管理: ドライバーをバックアップするか、フォルダーからインストール。

