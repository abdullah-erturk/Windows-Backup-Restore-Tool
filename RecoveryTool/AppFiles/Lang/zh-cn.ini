UI_HelpText=此工具用于备份、还原和修复 Windows 引导记录以及管理驱动程序。\n\n工作原理：\n1. 备份：选择分区并将其保存为 .wim 文件。\n2. 还原：选择 .wim 文件，选择目标磁盘/分区。\n3. 引导修复：使用自动扫描和修复。\n4. 驱动程序管理：备份现有驱动程序或从文件夹安装驱动程序。

