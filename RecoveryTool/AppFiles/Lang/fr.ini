UI_HelpText=Cet outil est conçu pour sauvegarder, restaurer et réparer les enregistrements de démarrage Windows et gérer vos pilotes.\n\nFonctionnement :\n1. Sauvegarder : Sélectionner une partition et l'enregistrer en fichier .wim.\n2. Restaurer : Sélectionner un fichier .wim, choisir le disque/partition cible.\n3. Réparation du démarrage : Utiliser l'analyse et la réparation automatiques.\n4. Gestion des pilotes : Sauvegarder les pilotes ou les installer depuis un dossier.

